version: '3.8'
services:
  finhealthsnap:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finhealthsnap
    ports:
      - "3005:3000"
    environment:
      - DATABASE_URL=file:/app/prisma/dev.db
    volumes:
      - finhealth-db:/app/prisma
    restart: unless-stopped

volumes:
  finhealth-db:
